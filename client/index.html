<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Typeahead</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: #fff; display: flex; flex-direction: column; align-items: center; padding-top: 100px; margin: 0; }
        .container { position: relative; width: 500px; }
        input { width: 100%; padding: 15px; border-radius: 8px; border: 1px solid #334155; font-size: 16px; background: rgba(30, 41, 59, 0.7); color: white; box-sizing: border-box; backdrop-filter: blur(10px); }
        input:focus { outline: none; border-color: #3b82f6; }
        .dropdown { position: absolute; top: 100%; left: 0; right: 0; background: rgba(30, 41, 59, 0.9); border-radius: 8px; margin-top: 5px; display: none; overflow: hidden; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); backdrop-filter: blur(10px); border: 1px solid #334155; }
        .dropdown-item { padding: 12px 15px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: background 0.2s; }
        .dropdown-item.active { background: #3b82f6; color: white; }
        .dropdown-item.active .count { color: #e2e8f0; }
        .count { color: #94a3b8; font-size: 12px; }
        .loading, .error { padding: 12px 15px; font-size: 14px; color: #94a3b8; text-align: center; }
        .error { color: #ef4444; }
        .trending-section { margin-top: 30px; width: 500px; }
        .trending-title { font-size: 14px; color: #94a3b8; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
        .trending-chips { display: flex; flex-wrap: wrap; gap: 8px; }
        .chip { background: rgba(59, 130, 246, 0.2); border: 1px solid #3b82f6; color: #60a5fa; padding: 6px 12px; border-radius: 20px; font-size: 13px; cursor: pointer; transition: all 0.2s; }
        .chip:hover { background: #3b82f6; color: white; }
        #message { margin-top: 10px; color: #10b981; font-size: 14px; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <input type="text" id="search-box" placeholder="Search for products, brands and more..." autocomplete="off">
        <div id="dropdown" class="dropdown"></div>
        <div id="message"></div>
    </div>
    
    <div class="trending-section">
        <div class="trending-title">Trending Searches</div>
        <div id="trending-container" class="trending-chips"></div>
    </div>

    <script>
        const API_BASE = 'http://localhost:3000';
        const searchBox = document.getElementById('search-box');
        const dropdown = document.getElementById('dropdown');
        const trendingContainer = document.getElementById('trending-container');
        const messageDiv = document.getElementById('message');
        
        let debounceTimer;
        let currentSuggestions = [];
        let activeIndex = -1;

        function showLoading() {
            dropdown.innerHTML = '<div class="loading">Loading suggestions...</div>';
            dropdown.style.display = 'block';
        }

        function showError(msg) {
            dropdown.innerHTML = `<div class="error">${msg}</div>`;
            dropdown.style.display = 'block';
        }

        searchBox.addEventListener('input', (e) => {
            const query = e.target.value.trim();
            messageDiv.textContent = '';
            activeIndex = -1;
            
            clearTimeout(debounceTimer);
            if (!query) {
                dropdown.style.display = 'none';
                currentSuggestions = [];
                return;
            }
            
            showLoading();
            
            debounceTimer = setTimeout(() => {
                fetch(`${API_BASE}/suggest?q=${encodeURIComponent(query)}`)
                    .then(res => {
                        if (!res.ok) throw new Error('Network error');
                        return res.json();
                    })
                    .then(data => {
                        currentSuggestions = data.suggestions || [];
                        dropdown.innerHTML = '';
                        if (currentSuggestions.length === 0) {
                            dropdown.innerHTML = '<div class="loading">No suggestions found</div>';
                            return;
                        }
                        
                        currentSuggestions.forEach((item, index) => {
                            const div = document.createElement('div');
                            div.className = 'dropdown-item';
                            div.id = `suggestion-${index}`;
                            div.innerHTML = `<span>${item.query}</span> <span class="count">${item.count}</span>`;
                            div.onclick = () => {
                                searchBox.value = item.query;
                                dropdown.style.display = 'none';
                                fireSearch(item.query);
                            };
                            dropdown.appendChild(div);
                        });
                        dropdown.style.display = 'block';
                    })
                    .catch(err => {
                        console.error(err);
                        showError('Failed to load suggestions');
                    });
            }, 250);
        });

        searchBox.addEventListener('keydown', (e) => {
            if (!currentSuggestions.length && e.key !== 'Enter') return;

            if (e.key === 'ArrowDown') {
                e.preventDefault();
                activeIndex = (activeIndex + 1) % currentSuggestions.length;
                updateActiveItem();
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                activeIndex = (activeIndex - 1 + currentSuggestions.length) % currentSuggestions.length;
                updateActiveItem();
            } else if (e.key === 'Enter') {
                e.preventDefault();
                let query = searchBox.value.trim();
                if (activeIndex >= 0 && currentSuggestions[activeIndex]) {
                    query = currentSuggestions[activeIndex].query;
                    searchBox.value = query;
                }
                if (query) {
                    dropdown.style.display = 'none';
                    fireSearch(query);
                }
            }
        });

        function updateActiveItem() {
            const items = dropdown.querySelectorAll('.dropdown-item');
            items.forEach((item, index) => {
                if (index === activeIndex) {
                    item.classList.add('active');
                    item.scrollIntoView({ block: 'nearest' });
                } else {
                    item.classList.remove('active');
                }
            });
        }

        function fireSearch(query) {
            fetch(`${API_BASE}/search`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query })
            })
            .then(res => res.json())
            .then(data => {
                messageDiv.textContent = data.message || 'Searched';
            })
            .catch(console.error);
        }

        function loadTrending() {
            fetch(`${API_BASE}/trending`)
                .then(res => res.json())
                .then(data => {
                    const trending = data.trending || [];
                    trendingContainer.innerHTML = '';
                    trending.forEach(item => {
                        const chip = document.createElement('div');
                        chip.className = 'chip';
                        chip.textContent = item.query;
                        chip.onclick = () => {
                            searchBox.value = item.query;
                            fireSearch(item.query);
                        };
                        trendingContainer.appendChild(chip);
                    });
                })
                .catch(console.error);
        }

        loadTrending();
        setInterval(loadTrending, 30000);

        document.addEventListener('click', (e) => {
            if (!e.target.closest('.container')) {
                dropdown.style.display = 'none';
            }
        });
    </script>
</body>
</html>
